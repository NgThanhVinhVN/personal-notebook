spring.application.name=personal-notebook

# ============================================================
# Server
# ============================================================
server.port=8080


# ============================================================
# JPA / Hibernate
# ============================================================
# MySQL8Dialect bị deprecated trong Hibernate 6.x (Spring Boot 3.x)
# Hibernate 6 tự detect dialect từ driver - không cần khai báo thủ công
# spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
# spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# DB Connection
spring.datasource.url=jdbc:postgresql://localhost:5432/personal_notebook_db
spring.datasource.username=postgres
spring.datasource.password=thanhvinh123
# Replace 'root' with your actual pgAdmin/PostgreSQL password.

# Thymeleaf caching for development

# ============================================================
# Thymeleaf
# ============================================================
spring.thymeleaf.cache=false

# ============================================================
# Error handling
# ============================================================
server.error.include-message=always
