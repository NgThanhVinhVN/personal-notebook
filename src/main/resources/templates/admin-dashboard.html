<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Personal Notebook</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .admin-sidebar { min-height: 100vh; background: #1e293b; color: white; }
        .admin-nav .nav-link { color: #cbd5e1; border-radius: 8px; margin-bottom: 5px; }
        .admin-nav .nav-link:hover, .admin-nav .nav-link.active { background: #334155; color: white; }
    </style>
</head>
<body>

<div class="container-fluid p-0">
    <div class="row g-0">
        <!-- Sidebar -->
        <div class="col-md-2 admin-sidebar p-3">
            <h4 class="text-center py-3 border-bottom border-secondary mb-4"><i class="bi bi-shield-lock text-primary"></i> ADMIN DASHBOARD</h4>
            <ul class="nav flex-column admin-nav">
                <li class="nav-item">
                    <a class="nav-link active" th:href="@{/admin/dashboard}"><i class="bi bi-people me-2"></i> Quản lý Người dùng</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/admin/notebooks}"><i class="bi bi-journal-text me-2"></i> Quản lý Sổ tay</a>
                </li>
                <li class="nav-item mt-auto pt-5">
                    <form th:action="@{/logout}" method="post">
                        <button type="submit" class="btn btn-danger w-100"><i class="bi bi-box-arrow-right me-2"></i> Đăng xuất</button>
                    </form>
                </li>
            </ul>
        </div>
        
        <!-- Main content -->
        <div class="col-md-10 p-5 bg-light">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="fw-bold">Hệ thống Người dùng</h2>
                <div class="badge bg-primary fs-6 p-2">Quản trị viên</div>
            </div>

            <div th:if="${param.deleted}" class="alert alert-success alert-dismissible fade show" role="alert">
                Đã xóa người dùng thành công!
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>

            <div class="card p-0 overflow-hidden border-0 shadow-sm">
                <table class="table table-hover mb-0">
                    <thead class="table-dark">
                        <tr>
                            <th class="py-3 px-4"># ID</th>
                            <th class="py-3">Tên đăng nhập</th>
                            <th class="py-3">Họ và tên</th>
                            <th class="py-3">Email</th>
                            <th class="py-3 text-end px-4">Hành động</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="user : ${users}">
                            <td class="py-3 px-4" th:text="${user.id}"></td>
                            <td class="py-3 fw-bold" th:text="${user.username}"></td>
                            <td class="py-3" th:text="${user.fullName}"></td>
                            <td class="py-3" th:text="${user.email}"></td>
                            <td class="py-3 text-end px-4">
                                <a th:href="@{/admin/user/delete/{id}(id=${user.id})}" class="btn btn-sm btn-outline-danger" onclick="return confirm('Xóa người dùng này sẽ XÓA TOÀN BỘ SỔ TAY CỦA HỌ. Bạn có chắc chắn?')"><i class="bi bi-trash"></i> Xóa tài khoản</a>
                            </td>
                        </tr>
                        <tr th:if="${users.empty}">
                            <td colspan="5" class="text-center py-4 text-muted">Chưa có người dùng nào đăng ký.</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
