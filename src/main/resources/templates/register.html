<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký - Personal Notebook</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="d-flex align-items-center bg-light" style="min-height: 100vh;">

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card p-5">
                <div class="text-center mb-4">
                    <h2 class="font-weight-bold text-primary">Tạo tài khoản mới</h2>
                    <p class="text-muted">Bắt đầu lưu trữ sổ tay của bạn ngay hôm nay</p>
                </div>

                <div th:if="${param.success}" class="alert alert-success text-center">
                    Đăng ký thành công! <a th:href="@{/login}">Đăng nhập ngay</a>.
                </div>

                <form th:action="@{/register/save}" method="post" th:object="${user}">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label text-muted fw-bold">Tên đăng nhập</label>
                            <input type="text" class="form-control" th:field="*{username}" placeholder="Tên đăng nhập">
                            <p th:errors="*{username}" class="text-danger small mt-1"></p>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label text-muted fw-bold">Họ và tên</label>
                            <input type="text" class="form-control" th:field="*{fullName}" placeholder="Họ và tên">
                            <p th:errors="*{fullName}" class="text-danger small mt-1"></p>
                        </div>
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label text-muted fw-bold">Email</label>
                        <input type="email" class="form-control" th:field="*{email}" placeholder="Địa chỉ email">
                        <p th:errors="*{email}" class="text-danger small mt-1"></p>
                    </div>

                    <div class="mb-4">
                        <label class="form-label text-muted fw-bold">Mật khẩu</label>
                        <input type="password" class="form-control" th:field="*{password}" placeholder="Mật khẩu">
                        <p th:errors="*{password}" class="text-danger small mt-1"></p>
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary btn-lg">Đăng ký tài khoản</button>
                    </div>
                </form>

                <div class="text-center mt-4 pt-3 border-top">
                    <p class="text-muted mb-1">Đã có tài khoản?</p>
                    <a th:href="@{/login}" class="text-decoration-none fw-bold">Đăng nhập ngay</a>
                    <br>
                    <a th:href="@{/}" class="text-decoration-none text-muted small">< Trở về trang chủ</a>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
