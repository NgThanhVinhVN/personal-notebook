<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Personal Notebook</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: white; }
        .card { background-color: #1e293b; border: none; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        .form-control { background-color: #0f172a; border-color: #334155; color: white; }
        .form-control:focus { background-color: #0f172a; color: white; border-color: #6366f1; box-shadow: 0 0 0 0.25rem rgba(99, 102, 241, 0.25); }
        .form-label { color: #94a3b8; }
    </style>
</head>
<body class="d-flex align-items-center" style="min-height: 100vh;">

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card p-5 rounded-4">
                <div class="text-center mb-4">
                    <i class="bi bi-shield-lock-fill text-primary" style="font-size: 3rem;"></i>
                    <h2 class="font-weight-bold mt-3">Quản Trị Viên</h2>
                    <p class="text-secondary small">Hệ thống Đăng nhập Dành riêng cho Admin</p>
                </div>

                <div th:if="${param.error}" class="alert alert-danger border-0 bg-danger text-white text-center">
                    Tài khoản Admin không hợp lệ!
                </div>

                <form th:action="@{/login}" method="post">
                    <div class="mb-3">
                        <label for="username" class="form-label fw-bold">Tài khoản Admin</label>
                        <input type="text" class="form-control form-control-lg" id="username" name="username" placeholder="Nhập admin username" required autofocus>
                    </div>
                    <div class="mb-4">
                        <label for="password" class="form-label fw-bold">Mật khẩu</label>
                        <input type="password" class="form-control form-control-lg" id="password" name="password" placeholder="Nhập mật khẩu" required>
                    </div>
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary btn-lg">Truy cập Dashboard</button>
                    </div>
                </form>

                <div class="text-center mt-5">
                    <a th:href="@{/}" class="text-decoration-none text-secondary small"><i class="bi bi-arrow-left"></i> Về trang người dùng</a>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
