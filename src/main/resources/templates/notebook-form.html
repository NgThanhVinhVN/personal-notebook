<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Tạo hoặc chỉnh sửa ghi chú — MyNotebook">
  <title th:text="${notebook.id == null ? 'Tạo ghi chú mới' : 'Chỉnh sửa ghi chú'} + ' — MyNotebook'">Ghi chú — MyNotebook</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<!-- ══ NAVBAR ══════════════════════════════════════════ -->
<nav class="app-navbar">
  <a th:href="@{/}" class="navbar-brand">
    <div class="brand-icon"><i class="bi bi-journal-text"></i></div>
    MyNotebook
  </a>

  <div class="navbar-actions" style="margin-left:auto;">
    <button class="dark-toggle" id="darkToggle" title="Chuyển chế độ tối/sáng" type="button">
      <i class="bi bi-moon-stars" id="darkIcon"></i>
    </button>
    <a th:href="@{/notebook}" class="user-menu-btn">
      <i class="bi bi-arrow-left"></i> Quay lại
    </a>
  </div>
</nav>

<!-- ══ FORM PAGE ════════════════════════════════════════ -->
<div class="form-page">
  <div class="form-card">

    <!-- Header -->
    <div class="form-header">
      <div>
        <h1 class="form-title"
            th:text="${notebook.id == null ? '✨ Tạo ghi chú mới' : '✏️ Chỉnh sửa ghi chú'}">
          Ghi chú
        </h1>
        <p style="font-size:.85rem;color:var(--text-muted);margin-top:.3rem;"
           th:text="${notebook.id == null ? 'Điền thông tin và lưu ghi chú của bạn.' : 'Cập nhật nội dung ghi chú.'}"></p>
      </div>
      <!-- Save-indicator dot -->
      <div id="saveIndicator" style="display:flex;align-items:center;gap:.4rem;font-size:.8rem;color:var(--text-muted);opacity:0;transition:opacity .3s;">
        <span style="width:8px;height:8px;border-radius:50%;background:#22c55e;display:inline-block;"></span>
        Đã tự lưu nháp
      </div>
    </div>

    <!-- FORM -->
    <form th:action="@{/notebook/save}" method="post" th:object="${notebook}" id="noteForm" novalidate>
      <input type="hidden" th:field="*{id}"/>
      <input type="hidden" th:field="*{pinned}"/>

      <!-- Hidden fields for tags & color (populated by JS) -->
      <input type="hidden" name="tags"  id="tagsInput"  th:field="*{tags}">
      <input type="hidden" name="color" id="colorInput" th:field="*{color}">

      <!-- ── TITLE ── -->
      <div style="margin-bottom:1.5rem;">
        <label class="form-label" for="titleField">Tiêu đề</label>
        <input type="text" class="form-input" id="titleField" th:field="*{title}"
               placeholder="Nhập tiêu đề ghi chú..." autocomplete="off" maxlength="200"
               style="font-size:1.1rem;font-weight:600;">
        <p th:if="${#fields.hasErrors('title')}" th:errors="*{title}"
           style="color:#ef4444;font-size:.8rem;margin-top:.3rem;"></p>
      </div>

      <!-- ── CATEGORY ── -->
      <div style="margin-bottom:1.5rem;">
        <label class="form-label" for="categoryField">Danh mục</label>
        <select class="form-input form-select" id="categoryField" th:field="*{category}" onchange="onCategoryChange(this.value)">
          <option value="Cá nhân">🟢 Cá nhân</option>
          <option value="Công việc">🔵 Công việc</option>
          <option value="Học tập">🟡 Học tập</option>
          <option value="Sức khỏe">🟣 Sức khỏe</option>
          <option value="Khẩn cấp">🔴 Khẩn cấp</option>
          <option value="Khác">⚫ Khác</option>
        </select>
        <p th:if="${#fields.hasErrors('category')}" th:errors="*{category}"
           style="color:#ef4444;font-size:.8rem;margin-top:.3rem;"></p>
      </div>

      <!-- ── TAGS (multi-select clickable chips) ── -->
      <div style="margin-bottom:1.5rem;">
        <label class="form-label">Tags <span style="font-weight:400;text-transform:none;">(chọn nhiều)</span></label>
        <div class="tag-selector" id="tagSelector">
          <button type="button" class="tag-btn" data-tag="Cá nhân"   data-color="#22c55e" style="color:#22c55e;border-color:#22c55e;">
            <span class="tag-dot" style="background:#22c55e;"></span> Cá nhân
          </button>
          <button type="button" class="tag-btn" data-tag="Công việc" data-color="#3b82f6" style="color:#3b82f6;border-color:#3b82f6;">
            <span class="tag-dot" style="background:#3b82f6;"></span> Công việc
          </button>
          <button type="button" class="tag-btn" data-tag="Học tập"   data-color="#f59e0b" style="color:#f59e0b;border-color:#f59e0b;">
            <span class="tag-dot" style="background:#f59e0b;"></span> Học tập
          </button>
          <button type="button" class="tag-btn" data-tag="Sức khỏe" data-color="#a855f7" style="color:#a855f7;border-color:#a855f7;">
            <span class="tag-dot" style="background:#a855f7;"></span> Sức khỏe
          </button>
          <button type="button" class="tag-btn" data-tag="Khẩn cấp" data-color="#ef4444" style="color:#ef4444;border-color:#ef4444;">
            <span class="tag-dot" style="background:#ef4444;"></span> Khẩn cấp
          </button>
          <button type="button" class="tag-btn" data-tag="Khác"     data-color="#64748b" style="color:#64748b;border-color:#64748b;">
            <span class="tag-dot" style="background:#64748b;"></span> Khác
          </button>
        </div>
        <p style="font-size:.75rem;color:var(--text-muted);margin-top:.4rem;">
          Màu của tag đầu tiên được chọn sẽ là màu chủ đạo của ghi chú.
        </p>
      </div>

      <!-- ── CONTENT ── -->
      <div style="margin-bottom:1rem;">
        <label class="form-label" for="contentField">Nội dung</label>
        <textarea class="form-input form-textarea" id="contentField" th:field="*{content}"
                  placeholder="Viết nội dung ghi chú của bạn tại đây...&#10;&#10;Hỗ trợ xuống dòng, khoảng cách và định dạng tự do."
                  rows="12" oninput="updateCharCount(this)"></textarea>
        <div class="char-counter" id="charCounter">0 ký tự</div>
        <p th:if="${#fields.hasErrors('content')}" th:errors="*{content}"
           style="color:#ef4444;font-size:.8rem;margin-top:.3rem;"></p>
      </div>

      <!-- ── FORM ACTIONS ── -->
      <div class="form-actions">
        <a th:href="@{/notebook}" class="btn-secondary">Hủy</a>
        <button type="submit" class="btn-submit" id="submitBtn">
          <i class="bi bi-floppy save-icon"></i>
          <i class="bi bi-arrow-repeat saving-icon" id="spinIcon" style="display:none;"></i>
          <span id="submitLabel"
                th:text="${notebook.id == null ? 'Lưu ghi chú' : 'Cập nhật'}">Lưu</span>
        </button>
      </div>

    </form>
  </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script th:inline="javascript">
  /* ── Dark Mode ── */
  (function() {
    const saved = localStorage.getItem('theme') || 'light';
    document.documentElement.setAttribute('data-theme', saved);
    const icon = document.getElementById('darkIcon');
    if (icon) icon.className = saved === 'dark' ? 'bi bi-sun' : 'bi bi-moon-stars';
  })();

  document.getElementById('darkToggle').addEventListener('click', () => {
    const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
    const next   = isDark ? 'light' : 'dark';
    localStorage.setItem('theme', next);
    document.documentElement.setAttribute('data-theme', next);
    document.getElementById('darkIcon').className = next === 'dark' ? 'bi bi-sun' : 'bi bi-moon-stars';
  });

  /* ── Character Counter ── */
  function updateCharCount(el) {
    const counter = document.getElementById('charCounter');
    const len = el.value.length;
    counter.textContent = len.toLocaleString('vi-VN') + ' ký tự';
    counter.style.color = len > 5000 ? '#ef4444' : 'var(--text-muted)';
  }
  // Init on load
  const contentEl = document.getElementById('contentField');
  if (contentEl) updateCharCount(contentEl);

  /* ── Tag Multi-Selector ── */
  const tagsInput  = document.getElementById('tagsInput');
  const colorInput = document.getElementById('colorInput');
  const tagBtns    = document.querySelectorAll('.tag-btn');

  // Init selected tags from existing value
  const existingTags  = (tagsInput.value  || '').split(',').map(t => t.trim()).filter(Boolean);
  const existingColor = colorInput.value || '';
  let selectedTags  = new Set(existingTags);
  let primaryColor  = existingColor;

  function refreshTagUI() {
    tagBtns.forEach(btn => {
      const tag = btn.dataset.tag;
      btn.classList.toggle('selected', selectedTags.has(tag));
    });
    // Sync hidden inputs
    tagsInput.value  = [...selectedTags].join(',');
    colorInput.value = primaryColor;
  }

  tagBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      const tag   = btn.dataset.tag;
      const color = btn.dataset.color;

      if (selectedTags.has(tag)) {
        selectedTags.delete(tag);
        // If removed tag was primary, pick next
        if (primaryColor === color) {
          const remaining = [...tagBtns].filter(b => selectedTags.has(b.dataset.tag));
          primaryColor = remaining.length ? remaining[0].dataset.color : '';
        }
      } else {
        selectedTags.add(tag);
        // First tag selected becomes primary
        if (!primaryColor) primaryColor = color;
      }
      refreshTagUI();
    });
  });

  refreshTagUI(); // initial render

  /* ── Sync category → auto-select matching tag ── */
  function onCategoryChange(cat) {
    // Add the category as a tag if not already
    const matching = [...tagBtns].find(b => b.dataset.tag === cat);
    if (matching && !selectedTags.has(cat)) {
      const color = matching.dataset.color;
      selectedTags.add(cat);
      if (!primaryColor) primaryColor = color;
      refreshTagUI();
    }
  }

  /* ── Submit animation ── */
  document.getElementById('noteForm').addEventListener('submit', () => {
    const btn   = document.getElementById('submitBtn');
    const label = document.getElementById('submitLabel');
    const spin  = document.getElementById('spinIcon');
    btn.disabled = true;
    label.textContent = 'Đang lưu...';
    spin.style.display = 'inline';
    document.querySelector('.save-icon').style.display = 'none';
  });

  /* ── Auto-save draft indicator (UX only) ── */
  let autoSaveTimer;
  const saveIndicator = document.getElementById('saveIndicator');
  contentEl && contentEl.addEventListener('input', () => {
    clearTimeout(autoSaveTimer);
    autoSaveTimer = setTimeout(() => {
      saveIndicator.style.opacity = '1';
      setTimeout(() => { saveIndicator.style.opacity = '0'; }, 2000);
    }, 1500);
  });
</script>
</body>
</html>
