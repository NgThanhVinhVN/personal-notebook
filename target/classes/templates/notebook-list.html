<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sổ tay của tôi - Personal Notebook</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-light sticky-top">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}">
            <i class="bi bi-journal-text me-2"></i>MyNotebook
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/notebook}">Sổ tay của tôi</a>
                </li>
            </ul>
            <ul class="navbar-nav ms-auto">
                <li class="nav-item dropdown">
                    <a class="nav-link dropdown-toggle text-dark fw-bold" href="#" id="navbarDropdown" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                        <i class="bi bi-person-circle me-1"></i> <span th:text="${username}"></span>
                    </a>
                    <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="navbarDropdown">
                        <li>
                            <form th:action="@{/logout}" method="post">
                                <button type="submit" class="dropdown-item text-danger"><i class="bi bi-box-arrow-right me-2"></i> Đăng xuất</button>
                            </form>
                        </li>
                    </ul>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container mt-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold m-0">Sổ tay của bạn</h2>
        <a th:href="@{/notebook/create}" class="btn btn-primary shadow-sm"><i class="bi bi-plus-lg me-1"></i> Tạo sổ tay mới</a>
    </div>

    <div th:if="${param.success}" class="alert alert-success alert-dismissible fade show" role="alert">
        Đã lưu sổ tay thành công!
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>
    
    <div th:if="${param.deleted}" class="alert alert-success alert-dismissible fade show" role="alert">
        Đã xóa sổ tay thành công!
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>

    <div th:if="${notebooks.empty}" class="text-center py-5">
        <h5 class="text-muted">Bạn chưa có sổ tay nào. Hãy tạo một cái nhé!</h5>
    </div>

    <div class="row row-cols-1 row-cols-md-3 g-4 mb-5">
        <div class="col" th:each="notebook : ${notebooks}">
            <div class="card h-100">
                <div class="card-header bg-white border-bottom-0 pt-3 pb-0 d-flex justify-content-between align-items-center">
                    <span class="badge bg-secondary" th:text="${notebook.category}">Danh mục</span>
                </div>
                <div class="card-body">
                    <h5 class="card-title fw-bold" th:text="${notebook.title}">Tiêu đề</h5>
                    <p class="card-text notebook-content text-muted small mt-3" th:text="${#strings.abbreviate(notebook.content, 150)}"></p>
                </div>
                <div class="card-footer bg-white border-top-0 d-flex justify-content-between align-items-center pb-3">
                    <small class="text-muted" th:text="${#temporals.format(notebook.updatedAt, 'dd-MM-yyyy HH:mm')}"></small>
                    <div class="btn-group">
                        <a th:href="@{/notebook/edit/{id}(id=${notebook.id})}" class="btn btn-outline-primary btn-sm"><i class="bi bi-pencil"></i></a>
                        <a th:href="@{/notebook/delete/{id}(id=${notebook.id})}" class="btn btn-outline-danger btn-sm" onclick="return confirm('Bạn có chắc chắn muốn xóa sổ tay này?')"><i class="bi bi-trash"></i></a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
