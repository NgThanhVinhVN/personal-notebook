<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Sổ tay - Admin Dashboard</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        .admin-sidebar { min-height: 100vh; background: #1e293b; color: white; }
        .admin-nav .nav-link { color: #cbd5e1; border-radius: 8px; margin-bottom: 5px; }
        .admin-nav .nav-link:hover, .admin-nav .nav-link.active { background: #334155; color: white; }
    </style>
</head>
<body>

<div class="container-fluid p-0">
    <div class="row g-0">
        <!-- Sidebar -->
        <div class="col-md-2 admin-sidebar p-3">
             <h4 class="text-center py-3 border-bottom border-secondary mb-4"><i class="bi bi-shield-lock text-primary"></i> ADMIN DASHBOARD</h4>
            <ul class="nav flex-column admin-nav">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/admin/dashboard}"><i class="bi bi-people me-2"></i> Quản lý Người dùng</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link active" th:href="@{/admin/notebooks}"><i class="bi bi-journal-text me-2"></i> Quản lý Sổ tay</a>
                </li>
                <li class="nav-item mt-auto pt-5">
                    <form th:action="@{/logout}" method="post">
                        <button type="submit" class="btn btn-danger w-100"><i class="bi bi-box-arrow-right me-2"></i> Đăng xuất</button>
                    </form>
                </li>
            </ul>
        </div>
        
        <!-- Main content -->
        <div class="col-md-10 p-5 bg-light">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="fw-bold">Hệ thống Sổ tay</h2>
                <div class="badge bg-primary fs-6 p-2">Xem tổng thể sổ tay</div>
            </div>

            <div class="row g-4">
                <div class="col-md-4" th:each="notebook : ${notebooks}">
                    <div class="card h-100 border-0 shadow-sm border-start border-4 border-primary">
                        <div class="card-body">
                            <div class="d-flex justify-content-between">
                                <span class="badge bg-light text-dark border mb-2" th:text="${notebook.category}"></span>
                                <small class="text-muted"><i class="bi bi-person text-primary"></i> <b th:text="${notebook.user.username}"></b></small>
                            </div>
                            <h5 class="card-title fw-bold mt-2" th:text="${notebook.title}"></h5>
                            <p class="card-text text-muted small" th:text="${#strings.abbreviate(notebook.content, 100)}"></p>
                        </div>
                        <div class="card-footer bg-white border-0 text-muted small">
                           Tạo lúc: <span th:text="${#temporals.format(notebook.createdAt, 'dd-MM-yyyy HH:mm')}"></span>
                        </div>
                    </div>
                </div>
            </div>
            
            <div th:if="${notebooks.empty}" class="text-center py-5 text-muted">
                <h4>Hệ thống chưa có Sổ tay nào được tạo.</h4>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
