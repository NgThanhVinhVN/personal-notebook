<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Personal Notebook</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="d-flex align-items-center bg-light" style="min-height: 100vh;">

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-5">
            <div class="card p-5">
                <div class="text-center mb-4">
                    <h2 class="font-weight-bold text-primary">Đăng nhập</h2>
                    <p class="text-muted">Chào mừng trở lại! Vui lòng đăng nhập</p>
                </div>

                <div th:if="${param.error}" class="alert alert-danger text-center">
                    Tên đăng nhập hoặc mật khẩu không hợp lệ!
                </div>
                <div th:if="${param.logout}" class="alert alert-success text-center">
                    Bạn đã đăng xuất thành công!
                </div>

                <form th:action="@{/login}" method="post">
                    <div class="mb-3">
                        <label for="username" class="form-label text-muted fw-bold">Tên đăng nhập</label>
                        <input type="text" class="form-control" id="username" name="username" placeholder="Nhập tên đăng nhập" required autofocus>
                    </div>
                    <div class="mb-4">
                        <label for="password" class="form-label text-muted fw-bold">Mật khẩu</label>
                        <input type="password" class="form-control" id="password" name="password" placeholder="Nhập mật khẩu" required>
                    </div>
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary btn-lg">Đăng nhập</button>
                    </div>
                </form>

                <div class="text-center mt-4 pt-3 border-top">
                    <p class="text-muted mb-1">Chưa có tài khoản?</p>
                    <a th:href="@{/register}" class="text-decoration-none fw-bold">Đăng ký ngay</a>
                    <br>
                    <a th:href="@{/}" class="text-decoration-none text-muted small">< Trở về trang chủ</a>
                </div>
            </div>
        </div>
    </div>
</div>

</body>
</html>
