<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sửa Sổ tay - Personal Notebook</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-light bg-white sticky-top shadow-sm">
    <div class="container">
        <a class="navbar-brand" th:href="@{/}"><i class="bi bi-journal-text me-2"></i>MyNotebook</a>
    </div>
</nav>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card p-4">
                <div class="d-flex justify-content-between align-items-center border-bottom pb-3 mb-4">
                    <h3 class="fw-bold m-0" th:text="${notebook.id == null ? 'Tạo Sổ tay Mới' : 'Cập nhật Sổ tay'}">Tạo Sổ tay</h3>
                    <a th:href="@{/notebook}" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left"></i> Quay lại</a>
                </div>

                <form th:action="@{/notebook/save}" method="post" th:object="${notebook}">
                    <input type="hidden" th:field="*{id}" />
                    
                    <div class="mb-3">
                        <label class="form-label text-muted fw-bold">Tiêu đề</label>
                        <input type="text" class="form-control form-control-lg" th:field="*{title}" placeholder="Nhập tiêu đề sổ tay" required>
                        <p th:errors="*{title}" class="text-danger small mt-1"></p>
                    </div>

                    <div class="mb-3">
                        <label class="form-label text-muted fw-bold">Danh mục</label>
                        <select class="form-select" th:field="*{category}">
                            <option value="Cá nhân">Cá nhân</option>
                            <option value="Công việc">Công việc</option>
                            <option value="Học tập">Học tập</option>
                            <option value="Sức khỏe">Sức khỏe</option>
                            <option value="Khác">Khác</option>
                        </select>
                        <p th:errors="*{category}" class="text-danger small mt-1"></p>
                    </div>

                    <div class="mb-4">
                        <label class="form-label text-muted fw-bold">Nội dung</label>
                        <textarea class="form-control" th:field="*{content}" rows="10" placeholder="Viết nội dung của bạn ở đây..." required style="font-family: monospace; font-size: 1.1rem; line-height: 1.6;"></textarea>
                        <p th:errors="*{content}" class="text-danger small mt-1"></p>
                    </div>

                    <div class="d-flex justify-content-end gap-2 mt-4 pt-3 border-top">
                        <a th:href="@{/notebook}" class="btn btn-light px-4">Hủy</a>
                        <button type="submit" class="btn btn-primary px-5"><i class="bi bi-save me-2"></i> Lưu Sổ tay</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

</body>
</html>
